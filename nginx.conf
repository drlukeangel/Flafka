# Nginx config for Flink UI
#
# Two jobs:
#   1. Serve the React SPA (index.html for all non-file routes)
#   2. Reverse-proxy /api/* requests to Confluent Cloud APIs
#      (replaces the Vite dev server proxy in production)
#
# Proxy URLs are derived from .env at container startup by docker-entrypoint.sh.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- SPA fallback ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- API proxies ----------
    # These mirror the Vite dev proxy routes defined in vite.config.ts.
    # Each strips the /api/<service> prefix before forwarding.
    # proxy_ssl_server_name is required for HTTPS upstream with SNI.

    # Flink SQL REST API
    location /api/flink/ {
        proxy_pass ${FLINK_API_URL}/;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Confluent Cloud Management API (Compute Pool)
    location /api/fcpm/ {
        proxy_pass ${CONFLUENT_API_URL}/fcpm/;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Artifact API
    location /api/artifact/ {
        proxy_pass ${CONFLUENT_API_URL}/artifact/;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Kafka REST Proxy
    location /api/kafka/ {
        proxy_pass ${KAFKA_REST_ENDPOINT}/;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Schema Registry
    location /api/schema-registry/ {
        proxy_pass ${SR_URL}/;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telemetry / Metrics API
    location /api/telemetry/ {
        proxy_pass ${TELEMETRY_API_URL}/;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---------- Caching ----------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
