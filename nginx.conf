# Nginx config for Flink UI
#
# Two jobs:
#   1. Serve the React SPA (index.html for all non-file routes)
#   2. Reverse-proxy /api/* requests to Confluent Cloud APIs
#      (replaces the Vite dev server proxy in production)
#
# Environment variables (set at container runtime):
#   FLINK_API_URL        - e.g. https://flink.us-east-1.aws.confluent.cloud
#   CONFLUENT_API_URL    - e.g. https://api.confluent.cloud
#   KAFKA_REST_ENDPOINT  - e.g. https://pkc-xxxxx.us-east-1.aws.confluent.cloud:443
#   SR_URL               - e.g. https://psrc-xxxxx.us-east-1.aws.confluent.cloud
#   TELEMETRY_API_URL    - e.g. https://api.telemetry.confluent.cloud

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- SPA fallback ----------
    # Any route that doesn't match a real file gets index.html
    # (React Router / client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- API proxies ----------
    # These mirror the Vite dev proxy routes defined in vite.config.ts.
    # Each strips the /api/<service> prefix before forwarding.

    # Flink SQL REST API
    location /api/flink/ {
        proxy_pass ${FLINK_API_URL}/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Confluent Cloud Management API (Compute Pool, Artifacts)
    location /api/fcpm/ {
        proxy_pass ${CONFLUENT_API_URL}/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Kafka REST Proxy
    location /api/kafka/ {
        proxy_pass ${KAFKA_REST_ENDPOINT}/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Schema Registry
    location /api/schema-registry/ {
        proxy_pass ${SR_URL}/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telemetry / Metrics API
    location /api/telemetry/ {
        proxy_pass ${TELEMETRY_API_URL}/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---------- Caching ----------
    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html (so deployments take effect immediately)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
